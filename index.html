<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">Wedding Invitation</title>
    <!-- Favicon -->
    <link id="favicon" rel="icon" type="image/svg+xml" href="">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- <link rel="stylesheet" href="style.css"> -->
</head>
<style>
:root {
    --curtain-color: #b11226;
    --gold: #caa46a;
    --bg-light: #ffffff;
    --text-dark: #2b1410;
    --text-muted: #7b7b7b;
    --accent: #c9828a; /* Soft dusty rose from Untitled-1 light variant */
    --accent-dark: #a86a71;
    --border-color: #e1d7cd;
    --hidden-bg: #f7f3ef;
    --font-serif: 'Bodoni Moda', serif;
    --font-sans: 'Lato', sans-serif;
    --font-accent: 'Playfair Display', serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    scroll-behavior: smooth;
}

body {
    background-color: var(--bg-light);
    font-family: var(--font-sans);
    color: var(--text-dark);
    overflow: hidden; /* Lock scroll for entry */
}

body.content-ready {
    overflow-y: auto; /* Unlock website */
}

/* --- Audio Button --- */
.audio-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--gold);
    color: var(--curtain-color);
    cursor: pointer;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, background 0.3s ease;
}

.audio-btn:hover {
    transform: scale(1.1);
    background: white;
}

/* --- BUTTON --- */
.calendar-btn-container {
    margin-top: 30px;
    height: 50px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 1s ease;
    pointer-events: none;
}

.calendar-btn-container.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

.btn {
    background-color: transparent;
    color: var(--accent);
    padding: 12px 25px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    font-family: var(--font-main);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
}

.btn:hover {
    background-color: var(--accent);
    color: #fff;
    box-shadow: 0 5px 15px rgba(177, 18, 38, 0.3);
}

/* --- Theater Section (Video) --- */
.theater-section {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
}

.video-container {
    position: relative;
    width: 100%;
    height: 100%;
}

#curtainVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.curtain-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    text-align: center;
    color: white;
    cursor: pointer;
    transition: opacity 0.5s ease;
}

.theater-section.playing .curtain-content {
    opacity: 0;
    pointer-events: none;
}

.tap-to-open {
    font-family: var(--font-serif);
    letter-spacing: 4px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.pulse-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 10px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}


/* --- Reveal Section --- */
.reveal-section {
    min-height: 90vh;
    padding: 60px 20px;
    display: none; /* Hidden until entry is finished */
    justify-content: center;
    align-items: center;
    background: var(--bg-light);
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
}

body.content-ready .reveal-section {
    display: flex;
    opacity: 1;
}

.reveal-inner {
    max-width: 600px;
    width: 100%;
}

.invite-text {
    font-family: var(--font-sans);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 15px;
    text-transform: uppercase;
}

.couple-names {
    font-family: var(--font-accent);
    font-size: 2.8rem;
    line-height: 1.2;
    margin-bottom: 40px;
    color: var(--text-dark);
}

.couple-names .ampersand {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--gold);
}

/* --- Scratch Hearts (Mobile-First) --- */
.scratch-container {
    margin: 30px 0;
}

.scratch-instruction {
    font-family: var(--font-serif);
    font-size: 0.9rem;
    font-style: italic;
    color: var(--text-muted);
    margin-bottom: 25px;
}

.hearts-row {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.heart-container {
    position: relative;
    width: 130px; /* Reduced for mobile-first */
    height: 115px; /* Proportional to 260x230 */
    margin: 0 auto;
    clip-path: path("M65 109 C65 109, 130 74, 130 41.5 C130 13.5, 102 -5, 79 9 C65 18.5, 65 18.5, 65 18.5 C65 18.5, 65 18.5, 51 9 C28 -5, 0 13.5, 0 41.5 C0 74, 65 109, 65 109 Z");
    background: var(--hidden-bg);
    cursor: crosshair;
    touch-action: none;
}

.hidden-content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: var(--hidden-bg);
    z-index: 1;
}

.hidden-content .label {
    font-size: 0.5rem;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
}

.hidden-content .value {
    font-family: var(--font-serif);
    font-size: 1.8rem;
    color: var(--text-dark);
}

.scratch-canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    width: 100%;
    height: 100%;
    transition: opacity 0.8s ease;
}

.footer-note {
    margin-top: 40px;
    font-family: var(--font-sans);
    font-size: 0.75rem;
    line-height: 1.6;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
}

@media (min-width: 768px) {
    .couple-names { font-size: 4rem; line-height: 1.1; }
    .heart-container { width: 200px; height: 177px; }
    .hidden-content .value { font-size: 2.8rem; }
    .hidden-content .label { font-size: 0.6rem; }
    .hearts-row { gap: 30px; }
    
    /* Recalculate clip-path for larger size if needed, but scaling works better */
    .heart-container {
        clip-path: path("M100 167.7 C100 167.7, 200 113.8, 200 63.8 C200 20.8, 156.9 -7.7, 121.5 13.8 C100 28.5, 100 28.5, 100 28.5 C100 28.5, 100 28.5, 78.5 13.8 C43.1 -7.7, 0 20.8, 0 63.8 C0 113.8, 100 167.7, 100 167.7 Z");
    }
}



</style>

<body>

    <!-- Audio Player -->
    <audio id="bgMusic" loop>
        <source id="audioSource" src="" type="audio/mpeg">
    </audio>

    <button id="audioToggle" class="audio-btn" aria-label="Toggle Audio">
        <svg id="audioIcon" viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor"
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
        </svg>
    </button>


    <!-- Section 1: Theater Curtain Video Reveal -->
    <section id="theaterSection" class="theater-section">
        <div class="video-container">
            <video id="curtainVideo" playsinline muted preload="auto">
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>

            <!-- Interaction Overlay -->
            <div id="videoOverlay" class="curtain-content">
                <div class="tap-to-open">
                    <span class="pulse-icon">👆</span>
                    <p>TAP TO OPEN</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Section 2: Couple Reveal & Scratch-off -->
    <section id="revealSection" class="reveal-section">
        <div class="reveal-inner">
            <p class="invite-text">YOU ARE CORDIALLY INVITED TO CELEBRATE THE WEDDING OF</p>
            <h1 id="coupleNamesDisplay" class="couple-names">Loading...</h1>

            <div class="scratch-container">
                <p class="scratch-instruction">Scratch to discover the date</p>

                <div class="hearts-row">
                    <!-- Day Heart -->
                    <div class="heart-item">
                        <div class="heart-container" id="heartContainer1">
                            <div class="hidden-content">
                                <span class="label">DAY</span>
                                <span id="weddingDay" class="value">--</span>
                            </div>
                            <canvas id="scratchCanvas1" class="scratch-canvas"></canvas>
                        </div>
                    </div>

                    <!-- Month Heart -->
                    <div class="heart-item">
                        <div class="heart-container" id="heartContainer2">
                            <div class="hidden-content">
                                <span class="label">MONTH</span>
                                <span id="weddingMonth" class="value">--</span>
                            </div>
                            <canvas id="scratchCanvas2" class="scratch-canvas"></canvas>
                        </div>
                    </div>

                    <!-- Year Heart -->
                    <div class="heart-item">
                        <div class="heart-container" id="heartContainer3">
                            <div class="hidden-content">
                                <span class="label">YEAR</span>
                                <span id="weddingYear" class="value">--</span>
                            </div>
                            <canvas id="scratchCanvas3" class="scratch-canvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="calendar-btn-container" id="calendarBtnContainer">
                <a id="calendarLink" href="#" target="_blank" class="btn">
                    Add to Calendar
                </a>
            </div>

            <div class="footer-note">
                <p>WE WOULD LIKE TO INVITE YOU TO CELEBRATE WITH US THE MOST SPECIAL DAY OF OUR LIVES.</p>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    // 1. Fetch site data first
    fetch('site.json')
        .then(response => response.json())
        .then(data => {
            injectSiteData(data);
            initApp();
        })
        .catch(err => {
            console.error('Error loading site data:', err);
            // Fallback initialization if JSON fails
            initApp();
        });

    function injectSiteData(data) {
        // Update Page Title
        if (data.pageTitle) document.title = data.pageTitle;

        // Update Favicon
        const favicon = document.getElementById('favicon');
        if (favicon && data.favicon) {
            favicon.href = data.favicon;
        }

        // Update Media Sources
        const audioSource = document.getElementById('audioSource');
        const videoSource = document.getElementById('videoSource');
        const bgMusic = document.getElementById('bgMusic');
        const curtainVideo = document.getElementById('curtainVideo');

        if (audioSource && data.audioSrc) {
            audioSource.src = data.audioSrc;
            bgMusic.load();
        }
        if (videoSource && data.videoSrc) {
            videoSource.src = data.videoSrc;
            curtainVideo.load();
        }

        // Update Couple Names (Stacked)
        const namesDisplay = document.getElementById('coupleNamesDisplay');
        if (namesDisplay && data.coupleNames) {
            const formattedNames = data.coupleNames.replace(' & ', '<br><span class="ampersand">&</span><br>');
            namesDisplay.innerHTML = formattedNames;
        }

        // Update Wedding Date
        if (data.weddingDate) {
            const dayEl = document.getElementById('weddingDay');
            const monthEl = document.getElementById('weddingMonth');
            const yearEl = document.getElementById('weddingYear');

            if (dayEl) dayEl.textContent = data.weddingDate.day;
            if (monthEl) monthEl.textContent = data.weddingDate.month;
            if (yearEl) yearEl.textContent = data.weddingDate.year;
        }

        // Update Calendar Link
        const calendarLink = document.getElementById('calendarLink');
        if (calendarLink && data.calendar) {
            const baseUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE";
            const url = `${baseUrl}&text=${encodeURIComponent(data.calendar.text)}&dates=${data.calendar.dates}&details=${encodeURIComponent(data.calendar.details)}&location=${encodeURIComponent(data.calendar.location)}`;
            calendarLink.href = url;
        }
    }

    function initApp() {
        const theaterSection = document.getElementById('theaterSection');
        const curtainVideo = document.getElementById('curtainVideo');
        const bgMusic = document.getElementById('bgMusic');
        const audioToggle = document.getElementById('audioToggle');
        const audioIcon = document.getElementById('audioIcon');
        let isMusicPlaying = false;

        // --- Audio Logic ---
        function toggleAudio() {
            if (isMusicPlaying) {
                bgMusic.pause();
                audioIcon.innerHTML = '<path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM4 9v6h4l5 5V4L8 9H4z"/>';
            } else {
                bgMusic.play().catch(e => console.log("Audio play blocked:", e));
                audioIcon.innerHTML = '<path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
            }
            isMusicPlaying = !isMusicPlaying;
        }

        audioToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleAudio();
        });

        // --- Tab Switch / Focus Audio Logic ---
        function handleVisibilityChange() {
            if (document.hidden) {
                bgMusic.pause();
            } else if (isMusicPlaying) {
                bgMusic.play().catch(e => console.log("Audio resume blocked:", e));
            }
        }

        document.addEventListener('visibilitychange', handleVisibilityChange);
        window.addEventListener('blur', () => bgMusic.pause());
        window.addEventListener('focus', () => {
            if (isMusicPlaying) bgMusic.play().catch(e => console.log("Audio focus resume blocked:", e));
        });
        window.addEventListener('beforeunload', () => bgMusic.pause());

        // --- Video Curtain Logic ---
        theaterSection.addEventListener('click', () => {
            if (!theaterSection.classList.contains('playing')) {
                theaterSection.classList.add('playing');
                
                // Play video and music together
                curtainVideo.play();
                if (!isMusicPlaying) {
                    toggleAudio();
                }
            }
        });

        // Track if scrolling has been unlocked
        let scrollingUnlocked = false;

        // Handle mid-video reveal to unlock scrolling
        curtainVideo.addEventListener('timeupdate', () => {
            if (!scrollingUnlocked && curtainVideo.currentTime >= 3.5) {
                scrollingUnlocked = true;
                document.body.classList.add('content-ready');
            }
        });

        // --- Scratch-off Logic ---
        class ScratchHeart {
            constructor(canvasId, containerId, onReveal) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.container = document.getElementById(containerId);
                this.onReveal = onReveal;
                this.isDrawing = false;
                this.revealed = false;

                this.width = 160;
                this.height = 142;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.init();
            }

            init() {
                this.createScratchTexture();
                this.canvas.addEventListener('mousedown', (e) => { this.isDrawing = true; this.scratch(e); });
                this.canvas.addEventListener('touchstart', (e) => { this.isDrawing = true; this.scratch(e); }, { passive: false });
                window.addEventListener('mouseup', () => { this.isDrawing = false; });
                window.addEventListener('touchend', () => { this.isDrawing = false; });
                this.canvas.addEventListener('mousemove', (e) => this.scratch(e));
                this.canvas.addEventListener('touchmove', (e) => this.scratch(e), { passive: false });
            }

            createScratchTexture() {
                // Get computed accent colors
                const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
                const accentDarkColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-dark').trim();
                const borderColor = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim();

                this.ctx.fillStyle = accentColor;
                this.ctx.fillRect(0, 0, this.width, this.height);

                for (let i = 0; i < 2000; i++) {
                    const x = Math.random() * this.width;
                    const y = Math.random() * this.height;
                    const size = Math.random() * 2 + 1;
                    const colors = [accentColor, accentDarkColor, borderColor];
                    this.ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            getMousePos(e) {
                const rect = this.canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            }

            scratch(e) {
                if (!this.isDrawing || this.revealed) return;

                if (e.cancelable && e.type.startsWith('touch')) {
                    e.preventDefault();
                }

                const pos = this.getMousePos(e);
                
                this.ctx.globalCompositeOperation = 'destination-out';
                this.ctx.beginPath();
                this.ctx.arc(pos.x, pos.y, 22, 0, Math.PI * 2);
                this.ctx.fill();

                if (Math.random() > 0.4) this.checkProgress();
            }

            checkProgress() {
                if (this.revealed) return;

                const imageData = this.ctx.getImageData(0, 0, this.width, this.height);
                const pixels = imageData.data;
                let transparentPixels = 0;
                const sampleRate = 16;

                for (let i = 3; i < pixels.length; i += sampleRate) {
                    if (pixels[i] < 128) transparentPixels++;
                }

                const totalPixels = pixels.length / sampleRate;
                const percent = (transparentPixels / totalPixels) * 100;

                if (percent > 45) {
                    this.revealAll();
                }
            }

            revealAll() {
                this.revealed = true;
                this.canvas.style.opacity = '0';
                setTimeout(() => {
                    this.canvas.style.display = 'none';
                    this.onReveal();
                }, 800);
            }
        }

        let revealedHeartsCount = 0;
        const totalHearts = 3;

        function checkAllRevealed() {
            revealedHeartsCount++;
            if (revealedHeartsCount === totalHearts) {
                // Show calendar button
                const calendarBtn = document.getElementById('calendarBtnContainer');
                if (calendarBtn) {
                    setTimeout(() => {
                        calendarBtn.classList.add('visible');
                    }, 1000);
                }

                // Final celebratory sprinkle shower (subtle)
                const colors = ['#b11226', '#caa46a', '#f5e6d3', '#ffffff'];
                const duration = 2000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 3,
                        angle: 60,
                        spread: 80,
                        origin: { x: 0, y: 0.8 },
                        colors: colors
                    });
                    confetti({
                        particleCount: 3,
                        angle: 120,
                        spread: 80,
                        origin: { x: 1, y: 0.8 },
                        colors: colors
                    });
                    confetti({
                        particleCount: 2,
                        gravity: 0.4,
                        scalar: 1,
                        origin: { y: -0.1 },
                        colors: colors
                    });

                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }
        }

        // Pass the callback to each heart
        new ScratchHeart('scratchCanvas1', 'heartContainer1', checkAllRevealed);
        new ScratchHeart('scratchCanvas2', 'heartContainer2', checkAllRevealed);
        new ScratchHeart('scratchCanvas3', 'heartContainer3', checkAllRevealed);
    }
});

    </script>
</body>

</html>
